<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nitcode Login</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Icon -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-gradient-to-br from-gray-100 to-gray-200 min-h-screen flex items-center justify-center transition-all duration-500">

  <!-- Dark Mode Button -->
  <button onclick="toggleDark()" class="absolute top-5 right-5 text-xl">🌙</button>

  <div class="bg-white rounded-3xl shadow-xl p-8 w-[350px] transition-all duration-500">

    <!-- Icon -->
    <div class="flex justify-center mb-4">
      <div class="bg-gray-100 p-4 rounded-full">
        <i class="fas fa-fingerprint text-indigo-500 text-2xl"></i>
      </div>
    </div>

    <!-- Title -->
    <h2 class="text-center text-2xl font-bold text-gray-800">
      Daftar Nitcode Comunity
    </h2>
    <p class="text-center text-gray-500 text-sm mb-6">
      Login untuk masuk ke sistem
    </p>

    <!-- LOGIN -->
    <form id="loginForm" class="transition-all duration-500">

      <div class="mb-4">
        <label class="text-sm text-gray-600">Username</label>
        <div class="flex items-center border rounded-xl px-3 mt-1">
          <i class="fas fa-user text-gray-400"></i>
          <input id="loginUser" type="text" placeholder="Masukkan username"
            class="w-full p-2 outline-none">
        </div>
      </div>

      <div class="mb-4">
        <div class="flex justify-between text-sm text-gray-600">
          <label>Password</label>
          <a href="#" class="text-indigo-500">Lupa Password?</a>
        </div>

        <div class="flex items-center border rounded-xl px-3 mt-1">
          <i class="fas fa-lock text-gray-400"></i>
          <input id="loginPass" type="password"
            class="w-full p-2 outline-none" placeholder="Masukkan password">
          <i onclick="togglePassword('loginPass')" class="fas fa-eye cursor-pointer text-gray-400"></i>
        </div>
      </div>

      <button class="w-full bg-gradient-to-r from-indigo-500 to-purple-500 text-white py-2 rounded-xl shadow-md hover:scale-105 transition">
        Masuk Sekarang →
      </button>

    </form>

    <!-- SWITCH -->
    <p class="text-center text-sm text-gray-500 mt-4">
      Belum punya akun?
      <span onclick="toggleForm()" class="text-indigo-500 cursor-pointer">
        Daftar di sini
      </span>
    </p>

    <!-- REGISTER -->
    <form id="registerForm" class="hidden mt-6 transition-all duration-500">

      <div class="mb-3">
        <input id="regName" type="text" placeholder="Nama Lengkap"
          class="w-full border p-2 rounded-xl outline-none">
      </div>

      <div class="mb-3">
        <input id="regUser" type="text" placeholder="Username"
          class="w-full border p-2 rounded-xl outline-none">
      </div>

      <div class="mb-3 flex items-center border rounded-xl px-3">
        <input id="regPass" type="password" placeholder="Password"
          class="w-full p-2 outline-none">
        <i onclick="togglePassword('regPass')" class="fas fa-eye cursor-pointer text-gray-400"></i>
      </div>

      <button class="w-full bg-gradient-to-r from-purple-500 to-indigo-500 text-white py-2 rounded-xl shadow-md hover:scale-105 transition">
        Daftar Sekarang
      </button>

      <p class="text-center text-sm text-gray-500 mt-3">
        Sudah punya akun?
        <span onclick="toggleForm()" class="text-indigo-500 cursor-pointer">
          Login
        </span>
      </p>

    </form>

    <!-- Footer -->
    <p class="text-center text-xs text-gray-400 mt-6">
      © @MrPacDev
    </p>

  </div>

  <!-- JS -->
  <script>

    // Toggle Login/Register
    function toggleForm() {
      document.getElementById('loginForm').classList.toggle('hidden');
      document.getElementById('registerForm').classList.toggle('hidden');
    }

    // Show/Hide Password
    function togglePassword(id){
      let input = document.getElementById(id);
      input.type = input.type === "password" ? "text" : "password";
    }

    // Dark Mode
    function toggleDark(){
      document.body.classList.toggle("bg-gray-900");
      document.body.classList.toggle("text-white");
    }

    // Login Validation
    document.getElementById("loginForm").addEventListener("submit", function(e){
      e.preventDefault();

      let user = document.getElementById("loginUser").value;
      let pass = document.getElementById("loginPass").value;

      if(user === "" || pass === ""){
        alert("Username & Password wajib diisi!");
      } else {
        localStorage.setItem("user", user);
        alert("Login berhasil!");
      }
    });

    // Register Validation
    document.getElementById("registerForm").addEventListener("submit", function(e){
      e.preventDefault();

      let name = document.getElementById("regName").value;
      let user = document.getElementById("regUser").value;
      let pass = document.getElementById("regPass").value;

      if(name === "" || user === "" || pass === ""){
        alert("Semua field wajib diisi!");
      } else {
        alert("Akun berhasil dibuat!");
        toggleForm();
      }
    });

  </script>

</body>
</html>
